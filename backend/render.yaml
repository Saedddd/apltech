services:
  - type: web
    name: apltech-backend
    runtime: image
    repo: https://github.com/Saedddd/apltech/tree/main/backend
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apltech-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://apltech-front-eight.vercel.app
      - key: COOKIE_VALIDATION_KEY
        generateValue: true

databases:
  - name: apltech-db
    plan: free